<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand"><h1>🤖 ResumeAI</h1></div>
            <ul class="nav-menu">
                <li><a href="../index.html">Dashboard</a></li>
                <li><a href="upload.html">Upload</a></li>
                <li><a href="results.html">Results</a></li>
                <li><a href="analytics.html" class="active">Analytics</a></li>
            </ul>
        </div>
    </nav>

    <div style="max-width: 1200px; margin: 3rem auto; padding: 2rem;">
        <h2>Analytics</h2>
        <canvas id="chart" style="max-height: 400px; margin-top: 2rem;"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/api.js"></script>
    <script>
        async function loadAnalytics() {
            const resumes = await getAllResumes();
            const ctx = document.getElementById('chart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: resumes.slice(0, 5).map((r, i) => `Candidate ${i+1}`),
                    datasets: [{
                        label: 'Score (%)',
                        data: resumes.slice(0, 5).map(r => r.score || 0),
                        backgroundColor: '#667eea'
                    }]
                },
                options: { responsive: true }
            });
        }
        loadAnalytics();
    </script>
</body>
</html>
